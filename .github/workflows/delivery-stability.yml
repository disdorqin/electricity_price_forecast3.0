name: delivery-stability

on:
  push:
  pull_request:

jobs:
  synthetic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow openpyxl

      - name: Compile critical files
        run: |
          python -m py_compile \
            pipelines/delivery_quality.py \
            pipelines/emergency_fallback.py \
            pipelines/delivery_report.py \
            pipelines/ledger_full.py \
            pipelines/ledger_full_range.py \
            pipelines/ledger_weight.py \
            runners/adapters/timesfm_v1.py \
            runners/adapters/lightgbm_v1.py \
            scripts/verify_range_pipeline.py \
            scripts/check_delivery_stability.py \
            main.py

      - name: CLI range argument checks
        run: python scripts/check_cli_range_args.py

      - name: Delivery stability synthetic checks
        run: python scripts/check_delivery_stability.py

      - name: Documentation and CLI surface checks
        run: |
          ! grep -R "四阶段" README.md docs pipelines scripts
          ! python main.py --help | grep "epf-v1-mode"
